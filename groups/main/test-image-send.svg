<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" fill="#1a1a2e"/>
  
  <!-- Geometric pattern -->
  <circle cx="100" cy="100" r="60" fill="url(#grad1)" opacity="0.6"/>
  <circle cx="300" cy="100" r="60" fill="url(#grad2)" opacity="0.6"/>
  <circle cx="100" cy="300" r="60" fill="url(#grad2)" opacity="0.6"/>
  <circle cx="300" cy="300" r="60" fill="url(#grad1)" opacity="0.6"/>
  
  <!-- Center pattern -->
  <rect x="150" y="150" width="100" height="100" fill="none" stroke="#4ade80" stroke-width="3" opacity="0.8">
    <animateTransform
      attributeName="transform"
      attributeType="XML"
      type="rotate"
      from="0 200 200"
      to="360 200 200"
      dur="10s"
      repeatCount="indefinite"/>
  </rect>
  
  <circle cx="200" cy="200" r="40" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.7">
    <animate attributeName="r" values="40;50;40" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <text x="200" y="380" font-family="monospace" font-size="14" fill="#94a3b8" text-anchor="middle">
    Test Image • Bagel
  </text>
</svg>
